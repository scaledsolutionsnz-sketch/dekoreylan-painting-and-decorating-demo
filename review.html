<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | DekoReylan Painting and Decorating</title>
<meta name="description" content="Tell us how we did — leave a review for DekoReylan Painting and Decorating, Christchurch.">
<meta name="theme-color" content="#211c18">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23bf5b3c'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='58' font-weight='600' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="review-wrap">
  <div class="review-card">
    <div class="mark">D</div>
    <h1>How did we do?</h1>
    <p>Your feedback helps us keep painting and decorating Christchurch homes the right way. Tap a star to get started.</p>
    <div class="stars-pick" id="stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <div class="review-hint" id="hint">Tap a star to rate your experience</div>
    <p style="margin-top:30px"><a href="index.html" class="back-link">← Back to site</a></p>
  </div>
</div>

<script>
(function(){
  // 4-5 stars → Google review; 1-3 stars → private feedback form
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  var stars = Array.prototype.slice.call(document.querySelectorAll('#stars button'));
  var hint = document.getElementById('hint');
  stars.forEach(function(btn){
    var v = parseInt(btn.dataset.v,10);
    btn.addEventListener('mouseenter',function(){ paint(v); });
    btn.addEventListener('click',function(){
      paint(v);
      if(v>=4){
        hint.textContent = "Thanks! Taking you to Google…";
        setTimeout(function(){ window.location.href = GOOGLE_REVIEW_URL; }, 600);
      } else {
        hint.textContent = "Thanks — we'd like to hear more.";
        setTimeout(function(){ window.location.href = "private.html?rating=" + v; }, 450);
      }
    });
  });
  document.getElementById('stars').addEventListener('mouseleave',function(){ paint(0); });
  function paint(n){ stars.forEach(function(b,i){ b.classList.toggle('lit', i < n); }); }
})();
</script>
</body>
</html>
