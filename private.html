<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Feedback | DekoReylan Painting and Decorating</title>
<meta name="description" content="Tell us where we can do better — private feedback for DekoReylan Painting and Decorating.">
<meta name="theme-color" content="#211c18">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23bf5b3c'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='58' font-weight='600' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="feedback-wrap">
  <div class="feedback-card">
    <div id="form-state">
      <div class="mark">D</div>
      <h1>Tell us more</h1>
      <p>We're sorry we didn't quite hit the mark. Let us know what happened and we'll put it right — this goes straight to the team, privately.</p>
      <form id="fb-form" action="https://formsubmit.co/hello@dekoreylan.co.nz" method="POST">
        <input type="hidden" name="_subject" value="Private feedback — DekoReylan website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://dekoreylan-painting-and-decorating-demo.vercel.app/private.html?sent=1">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="you@email.co.nz" required>
        </div>
        <div class="field">
          <label for="rating">Your rating</label>
          <input id="rating" type="text" name="rating" readonly>
        </div>
        <div class="field">
          <label for="feedback">What could we have done better?</label>
          <textarea id="feedback" name="feedback" placeholder="Tell us what happened…" required></textarea>
        </div>
        <button type="submit" class="btn btn--accent btn--block">Send Feedback</button>
      </form>
      <p style="margin-top:22px;text-align:center"><a href="index.html" class="back-link">← Back to site</a></p>
    </div>

    <div class="success-state" id="success">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
      <h2>Thanks for the feedback</h2>
      <p>We appreciate you taking the time. The team will be in touch if needed.</p>
      <p style="margin-top:26px"><a href="index.html" class="btn btn--dark">Back to Home</a></p>
    </div>
  </div>
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var rating = params.get('rating');
  var ratingField = document.getElementById('rating');
  if(ratingField){
    var r = parseInt(rating,10);
    if(r>=1 && r<=5){
      ratingField.value = r + " / 5  " + "★".repeat(r);
    } else {
      ratingField.value = "Not rated";
    }
  }
  if(params.get('sent')==='1'){
    var fs = document.getElementById('form-state');
    var su = document.getElementById('success');
    if(fs) fs.style.display='none';
    if(su) su.classList.add('show');
  }
})();
</script>
</body>
</html>
